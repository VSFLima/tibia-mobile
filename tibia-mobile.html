<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tibia Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a15;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        #loading h1 {
            color: #FFD700;
            font-family: monospace;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #loading .subtitle {
            color: #888;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .controls-hint {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #555;
            font-family: monospace;
            font-size: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h1>TIBIA MOBILE</h1>
        <div class="subtitle">Baseado em WorkAdventure</div>
        <div class="spinner"></div>
    </div>
    <canvas id="game"></canvas>
    <div class="controls-hint">
        WASD/Setas: Mover | Espaço: Ação | I: Inventário | C: Stats | E: Interagir
    </div>
    <script type="module">
        import { initTibiaGame } from './src/front/Phaser/Tibia/index.ts'
        initTibiaGame()
    </script>
</body>
</html>
